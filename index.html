<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:#000;
    font-family:Arial,sans-serif;
}

/* Hearts canvas */
canvas{
    position:fixed;
    inset:0;
}

/* Center content */
#center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    text-align:center;
}

#btn{
    padding:16px 36px;
    border:none;
    border-radius:999px;

    background:rgba(255,92,141,.15);
    color:white;

    font-size:22px;
    font-weight:bold;
    cursor:pointer;

    border:2px solid rgba(255,92,141,.6);

    box-shadow:
        0 0 15px rgba(255,92,141,.5),
        0 0 35px rgba(255,92,141,.3);

    transition:.3s;
}

#btn:hover{
    transform:scale(1.08);
    box-shadow:
        0 0 25px rgba(255,92,141,.9),
        0 0 50px rgba(255,92,141,.5);
}

#message{
    display:none;
    color:#ff4081;
    font-size:72px;
    font-weight:bold;
    text-shadow:
        0 0 15px #ff4081,
        0 0 30px #ff4081,
        0 0 60px #ff4081;
}
</style>
</head>
<body>

<div id="center">
    <button id="btn">Click Me ❤️</button>
    <div id="message">I LOVE YOU ❤️</div>
</div>

<canvas id="canvas"></canvas>

<script>
const btn = document.getElementById("btn");
const message = document.getElementById("message");

btn.addEventListener("click", () => {
    btn.style.display = "none";
    message.style.display = "block";
});

/* HEARTS */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

class Heart{
    constructor(){
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 50;

        this.size = 12 + Math.random() * 25;
        this.speed = 1 + Math.random() * 2.5;
        this.opacity = 0.5 + Math.random() * 0.5;

        const colors = [
            "#ff1744",
            "#ff4081",
            "#ff5c8d",
            "#ff80ab",
            "#ff3366"
        ];

        this.color = colors[Math.floor(Math.random()*colors.length)];
    }

    update(){
        this.y -= this.speed;
    }

    draw(){
        ctx.save();

        ctx.translate(this.x, this.y);

        const s = this.size / 20;
        ctx.scale(s, s);

        ctx.beginPath();
        ctx.moveTo(0, 0);

        ctx.bezierCurveTo(-10,-10,-20,10,0,20);
        ctx.bezierCurveTo(20,10,10,-10,0,0);

        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;

        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;

        ctx.fill();
        ctx.restore();
    }
}

const hearts = [];

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(Math.random() < 0.45){
        hearts.push(new Heart());
    }

    for(let i = hearts.length - 1; i >= 0; i--){

        hearts[i].update();
        hearts[i].draw();

        if(hearts[i].y < -50){
            hearts.splice(i,1);
        }
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
